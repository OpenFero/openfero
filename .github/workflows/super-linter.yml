# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "README*"
      - "CHANGELOG*"
      - "LICENSE*"
      - "CONTRIBUTORS*"
      - "AUTHORS*"
      - "operarios/README.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "README*"
      - "CHANGELOG*"
      - "LICENSE*"
      - "CONTRIBUTORS*"
      - "AUTHORS*"
      - "operarios/README.md"

# Default to read-only permissions
permissions:
  contents: read

# Cancel superseded lint runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  run-lint:
    permissions:
      contents: read # Required for actions/checkout to fetch code
      statuses: write # Required for github/super-linter to mark status of each linter run
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: frontend/.nvmrc
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        # Required so the //go:embed frontend/dist directive in main.go can be
        # type-checked by golangci-lint without a "no matching files found" error.
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CHECKOV: false
          VALIDATE_YAML: false
          # Go linting via golangci-lint using .github/linters/.golangci.yml
          # Disable file-mode VALIDATE_GO to avoid "named files must all be in one
          # directory" typechecking errors. VALIDATE_GO_MODULES (module-aware) runs
          # by default and handles changes spanning multiple Go packages correctly.
          VALIDATE_GO: false
          VALIDATE_JAVASCRIPT_ES: false # Disable ESLint in favor of Biome
          VALIDATE_JSX: false
          VALIDATE_TSX: false # Disable ESLint in favor of Biome
          VALIDATE_JSON: false # Disable ESLint/JSONLint in favor of Biome
          VALIDATE_CSS: false
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_GRAPHQL_PRETTIER: false # Disable Prettier in favor of Biome
          VALIDATE_HTML: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          # Disable Python linters as there is no production Python code
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_RUFF: false
          VALIDATE_PYTHON_RUFF_FORMAT: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: false
          # Disable TypeScript/Vue linting - handled by frontend-tests.yml workflow
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_VUE: false
          VALIDATE_VUE_PRETTIER: false
          TRIVY_CONFIG_FILE: "trivy.yaml"
          # GitLeaks configuration to exclude documentation files
          GITLEAKS_CONFIG_FILE: ".gitleaks.toml"
          KUBERNETES_KUBECONFORM_OPTIONS: "--ignore-missing-schemas --ignore-filename-pattern=charts/*"
          DEFAULT_BRANCH: "origin/main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
